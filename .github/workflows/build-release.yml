name: Build Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'DEPLOY.md'
      - 'deploy.sh'
      - '.github/workflows/ci.yml'
      - '.github/workflows/sync-upstream.yml'
      - 'repo-assets/**'
      - 'LICENSE'
      - 'dist/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prune devDependencies
        run: npm prune --omit=dev

      - name: Package release
        run: |
          mkdir -p /tmp/freellmapi-release
          cp -r server/dist /tmp/freellmapi-release/server-dist
          cp -r client/dist /tmp/freellmapi-release/client-dist
          cp -r shared /tmp/freellmapi-release/shared
          cp -r node_modules /tmp/freellmapi-release/node_modules
          cp package.json package-lock.json /tmp/freellmapi-release/
          cp server/package.json /tmp/freellmapi-release/server-package.json
          cp client/package.json /tmp/freellmapi-release/client-package.json
          cp .env.example /tmp/freellmapi-release/.env.example || true

          cd /tmp/freellmapi-release
          tar -czf /tmp/freellmapi-release.tar.gz .
          sha256sum /tmp/freellmapi-release.tar.gz > /tmp/freellmapi-release.tar.gz.sha256

      - name: Publish to dist branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin dist --depth=1 || true

          git checkout --orphan dist
          git reset --hard

          cp /tmp/freellmapi-release.tar.gz .
          cp /tmp/freellmapi-release.tar.gz.sha256 .

          echo "Auto-built from commit $(git rev-parse --short HEAD 2>/dev/null || echo 'unknown')" > BUILD_INFO.txt
          echo "Built at $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> BUILD_INFO.txt

          git add freellmapi-release.tar.gz freellmapi-release.tar.gz.sha256 BUILD_INFO.txt
          git commit -m "prebuilt: $(date -u '+%Y-%m-%d %H:%M UTC')"

          git push origin dist --force
